name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4.7
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q Godot_v4.7-stable_linux.x86_64.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot

      - name: Import and run tests
        run: |
          godot --headless --import
          godot --headless -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json
